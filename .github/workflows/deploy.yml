name: Deploy to EC2 via AWS SSM

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1                  # Replace with your AWS Region
  INSTANCE_ID: i-0123456789abcdef0       # Replace with your EC2 Instance ID (e.g. from GitHub Secrets or hardcoded)
  ECR_REPOSITORY: ssm-demo-app           # Replace with your ECR Repository Name

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          # Build, tag, and push image to AWS ECR
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Dispatch SSM deploy command
        shell: bash
        run: |
          set -euo pipefail
 
          BRANCH="${{ github.ref_name }}"
          REGION="${{ env.AWS_REGION }}"
          INSTANCE_ID="${{ env.INSTANCE_ID }}"
 
          # Write deploy script to a clean JSON file
          cat > /tmp/ssm-payload.json << ENDJSON
          {
            "DocumentName": "AWS-RunShellScript",
            "InstanceIds": ["${INSTANCE_ID}"],
            "Comment": "Backend deploy branch=${BRANCH} sha=${{ github.sha }}",
            "Parameters": {
              "commands": [
                "set -e",
                "cd /opt/sample-ssm-app/deployments/docker",
                "ACCOUNT_ID=\$(aws sts get-caller-identity --query Account --output text)",
                "ECR_URL=\${ACCOUNT_ID}.dkr.ecr.REGION_PLACEHOLDER.amazonaws.com",
                "aws ecr get-login-password --region REGION_PLACEHOLDER | docker login --username AWS --password-stdin \${ECR_URL}",
                "git fetch --all",
                "git checkout BRANCH_PLACEHOLDER",
                "git pull origin BRANCH_PLACEHOLDER",
                "docker compose down",
                "docker compose pull",
                "docker compose up -d --remove-orphans",
                "docker system prune -af"
              ]
            }
          }
          ENDJSON
 
          # Substitute placeholders with actual values
          sed -i "s|REGION_PLACEHOLDER|${REGION}|g" /tmp/ssm-payload.json
          sed -i "s|BRANCH_PLACEHOLDER|${BRANCH}|g" /tmp/ssm-payload.json
 
          # Dispatch the SSM command
          SSM_COMMAND_ID=$(aws ssm send-command \
            --region "${REGION}" \
            --cli-input-json file:///tmp/ssm-payload.json \
            --output text \
            --query "Command.CommandId")
 
          echo "SSM_COMMAND_ID=${SSM_COMMAND_ID}" >> $GITHUB_ENV
          echo "Dispatched SSM command: ${SSM_COMMAND_ID}"
 
      - name: Wait for SSM deploy to complete
        shell: bash
        run: |
          INSTANCE_ID="${{ env.INSTANCE_ID }}"
          REGION="${{ env.AWS_REGION }}"
 
          echo "Waiting for SSM command [${SSM_COMMAND_ID}] on instance [${INSTANCE_ID}] ..."
          echo ""
 
          # Poll every 10 seconds, max 6 minutes (36 attempts)
          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${SSM_COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --region "${REGION}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
 
            echo "  [${i}/36] Status: ${STATUS}"
 
            if [[ "${STATUS}" == "Success" ]]; then
              echo ""
              echo "✅ Deployment succeeded!"
              echo "════════ Remote Output ════════"
              aws ssm get-command-invocation \
                --command-id "${SSM_COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --region "${REGION}" \
                --query "StandardOutputContent" \
                --output text
              echo "═══════════════════════════════"
              exit 0
 
            elif [[ "${STATUS}" == "Failed" \
                 || "${STATUS}" == "TimedOut" \
                 || "${STATUS}" == "Cancelled" \
                 || "${STATUS}" == "DeliveryTimedOut" ]]; then
              echo ""
              echo "❌ Deployment FAILED — Status: ${STATUS}"
              echo "════════ Remote Error ════════"
              aws ssm get-command-invocation \
                --command-id "${SSM_COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --region "${REGION}" \
                --query "StandardErrorContent" \
                --output text
              echo "══════════════════════════════"
              exit 1
            fi
 
            sleep 10
          done
 
          echo "❌ Timed out after 6 minutes. SSM command did not complete."
          exit 1
